site_name: 智研 AI 法律系統 · Zhiyan AI Legal
site_description: 以分層架構、強制引用政策與安全路由為核心的台灣法律 AI 研究平台
site_author: Lucien
site_url: https://lucien-1127.github.io/zhiyan-legal/
repo_url: https://github.com/Lucien-1127/zhiyan-legal
repo_name: Lucien-1127/zhiyan-legal
edit_uri: blob/main/docs/

theme:
  name: material
  language: zh-TW
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
  palette:
    primary: indigo
    accent: deep orange
  font:
    text: Noto Sans TC
    code: JetBrains Mono

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Lucien-1127
    - icon: fontawesome/solid/envelope
      link: mailto:Lucien127@proton.me
  generator: false
  consent:
    title: 隱私說明
    description: 本網站使用 cookies 進行流量分析，不收集個人資料。

copyright: >
  Copyright &copy; 2026 Lucien —
  <a href="#__consent">管理 Cookie</a>

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

