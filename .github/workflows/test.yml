name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai>=1.0.0 python-dotenv>=1.0.0 tenacity>=8.0.0 httpx>=0.27.0 google-genai>=1.0.0 PyYAML>=6.0

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          PYTHONPATH=src python -m pytest tests/ -v --tb=short --cov=src/zhiyan_legal --cov-report=term-missing --ignore=tests/test_c54_validation.py

      - name: Verify dry-run works
        run: |
          PYTHONPATH=src python -m zhiyan_legal "測試查詢" --dry-run

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install \
            openai>=1.0.0 python-dotenv>=1.0.0 tenacity>=8.0.0 \
            httpx>=0.27.0 pydantic>=2.0.0 pytest pytest-cov pytest-asyncio

      - name: Run unit tests (no API keys required)
        env:
          ZHIYAN_API_KEY: sk-ci-dummy-placeholder
          AGNES_API_KEY_1: sk-ci-dummy-placeholder
          GEMINI_API_KEY: ci-dummy-placeholder
        run: |
          PYTHONPATH=src python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_c54_validation.py \
            --ignore=tests/run_ablation_v8_committee.py \
            --cov=src/zhiyan_legal --cov-report=term-missing \
            -m "not integration"

      - name: Dry-run smoke test
        continue-on-error: true
        env:
          ZHIYAN_API_KEY: sk-ci-dummy-placeholder
        run: |
          PYTHONPATH=src python -m zhiyan_legal "測試查詢" --dry-run

      - name: SDK smoke test (dry-run)
        env:
          ZHIYAN_API_KEY: sk-ci-dummy-placeholder
        run: |
          PYTHONPATH=src python -c "
from zhiyan_legal.sdk import ZhiyanClient
client = ZhiyanClient()
result = client.query('什麼是公然侮辱？', dry_run=True)
assert result.is_dry_run, 'SDK dry-run 失敗'
print('SDK smoke test 通過：', result.content)
"
