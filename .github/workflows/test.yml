name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai>=1.0.0 python-dotenv>=1.0.0 tenacity>=8.0.0 httpx>=0.27.0 google-genai>=1.0.0 PyYAML>=6.0

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          PYTHONPATH=src python -m pytest tests/ -v --tb=short --cov=src/zhiyan_legal --cov-report=term-missing --ignore=tests/test_c54_validation.py

      - name: Verify dry-run works
        run: |
          PYTHONPATH=src python -m zhiyan_legal "測試查詢" --dry-run
